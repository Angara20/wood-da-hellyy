<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generative Plant Art</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFF3E0;
            /* Warm solid cream sky color */
            touch-action: none;
            /* Prevent default touch actions like scrolling */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <canvas id="scene"></canvas>
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>

</html>
